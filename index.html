<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>

    <link rel="stylesheet" href="style.css" />

    <script src="main.js" defer></script>
  </head>
  <body>
    <header>
      <div class="content">
        <div class="header-logo">
          <img
            src="./assets/icons/fotogram-logo.png"
            alt="fotogram logo"
            id="fotogram-logo"
          />
          <img
            src="./assets/icons/fotogram-logo-name.png"
            alt="fotogram icon name"
            id="fotogram-logo-name"
          />
        </div>
      </div>
    </header>
    <main>
      <section class="main-content">
        <div class="content">
          <div class="content-wrapper">
            <div class="title">
              <h1>Japan durch die Linse</h1>
            </div>

            <div id="image-gallery"></div>

            <dialog id="myDialog">
              <div class="dialog-top">
                <h2 id="dialogTitle">Bildtitel</h2>
                <button class="close-btn" onclick="closeDialog()">×</button>
              </div>

              <div class="dialog-image-box">
                <img id="dialogImage" src="" alt="Großes Bild" />
              </div>

              <div class="dialog-controls">
                <button class="arrow-btn" onclick="prevImage()">←</button>
                <p id="dialogCount">1/12</p>
                <button class="arrow-btn" onclick="nextImage()">→</button>
              </div>
            </dialog>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <section>
        <div class="footer-content">
          <div class="content">
            <div class="footer-wrapper">
              <div class="da-logo">
                <img
                  src="./assets/icons/da-logo.png"
                  alt="Developer Akademie Logo"
                />
              </div>
              <div class="copyright">
                <p>© 2023 Developer Akademie GmbH</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </footer>
  </body>
</html>
